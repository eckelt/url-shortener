name = "url-shortener"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
BASE_URL = "https://ecke.lt"

# 1. KV Namespace erstellen:
#    npx wrangler kv namespace create URLS
#    npx wrangler kv namespace create URLS --preview
# 2. Die zurückgegebenen IDs unten eintragen
[[kv_namespaces]]
binding = "URLS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# AUTH_TOKEN als Secret setzen (nicht hier eintragen!):
#   npx wrangler secret put AUTH_TOKEN
